<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHADOW</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="hud-overlay">
      <div class="hud-ring ring-outer"></div>
      <div class="hud-ring ring-middle"></div>
      <div class="hud-ring ring-inner"></div>
      
      <div id="hud-left" class="hud-panel">
        <div class="panel-header">SYSTEM_CORE</div>
        <div id="system-stats">
          <div class="stat-row">CPU: <span id="cpu-load">00%</span></div>
          <div class="stat-row">MEM: <span id="mem-usage">00%</span></div>
          <div class="stat-row">NET: <span id="net-status">ONLINE</span></div>
        </div>
        <div class="panel-header" style="margin-top: 20px;">MEMORY_LOG</div>
        <div id="memory-feed"></div>
      </div>

      <div id="hud-right" class="hud-panel">
        <div class="panel-header">ACTIVE_TASKS</div>
        <div id="tasks-feed"></div>
        <div class="panel-header" style="margin-top: 20px;">CALENDAR</div>
        <div id="calendar-feed"></div>
      </div>
    </div>

    <canvas id="orb-canvas"></canvas>

    <!-- Minimal controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <div id="status-text"></div>
    <div id="shadow-label">SHADOW</div>
    <div id="error-text"></div>

    <!-- Chat Input -->
    <div id="chat-container">
      <input type="text" id="chat-input" placeholder="Message SHADOW..." autocomplete="off" />
      <button id="btn-send-chat" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
